<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="1024" viewBox="0 0 300 300" version="1.1">
  <defs>
    <clipPath id="clipOuter">
      <circle cx="150" cy="150" r="118" />
    </clipPath>
  </defs>

  <g fill="none" stroke="#000000" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Straight-line M / wings connector:
