<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1280" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF6FF"/>
    </linearGradient>
    <linearGradient id="line" x1="210" y1="0" x2="1190" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="250" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="250" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="250" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFBEB"/>
      <stop offset="1" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="250" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="300" height="230" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#2563EB"/>
    </marker>
  </defs>

  <rect width="1400" height="820" rx="32" fill="url(#bg)"/>
  <circle cx="1235" cy="122" r="86" fill="#BFDBFE" fill-opacity="0.35"/>
  <circle cx="168" cy="684" r="72" fill="#A7F3D0" fill-opacity="0.30"/>
  <circle cx="1295" cy="694" r="54" fill="#DDD6FE" fill-opacity="0.34"/>

  <text x="108" y="110" fill="#0F172A" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="700">望江挑花项目整体流程</text>
  <text x="108" y="148" fill="#475569" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20">设计软件、风格生成、实验验证、望江调研</text>

  <rect x="108" y="188" width="1184" height="6" rx="3" fill="url(#line)" fill-opacity="0.9"/>

  <path d="M230 282H420" stroke="#2563EB" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M530 282H720" stroke="#2563EB" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M830 282H1020" stroke="#2563EB" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)" transform="translate(108 220)">
    <rect width="250" height="200" rx="28" fill="url(#cardA)"/>
    <rect x="22" y="24" width="46" height="46" rx="14" fill="#10B981" fill-opacity="0.18"/>
    <text x="35" y="54" fill="#047857" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">01</text>
    <text x="24" y="100" fill="#0F172A" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="700">设计软件</text>
    <text x="24" y="134" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">输入、编辑与预览</text>
    <text x="24" y="162" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">预留算法接入接口</text>
    <text x="24" y="190" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">形成设计工作台</text>
  </g>

  <g filter="url(#shadow)" transform="translate(408 220)">
    <rect width="250" height="200" rx="28" fill="url(#cardB)"/>
    <rect x="22" y="24" width="46" height="46" rx="14" fill="#2563EB" fill-opacity="0.16"/>
    <text x="34" y="54" fill="#1D4ED8" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">02</text>
    <text x="24" y="100" fill="#0F172A" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="700">风格生成算法</text>
    <text x="24" y="134" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">整理纹样与风格特征</text>
    <text x="24" y="162" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">研究传统风格保留</text>
    <text x="24" y="190" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">支持新图自主生成</text>
  </g>

  <g filter="url(#shadow)" transform="translate(708 220)">
    <rect width="250" height="200" rx="28" fill="url(#cardC)"/>
    <rect x="22" y="24" width="46" height="46" rx="14" fill="#F59E0B" fill-opacity="0.18"/>
    <text x="34" y="54" fill="#B45309" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">03</text>
    <text x="24" y="100" fill="#0F172A" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="700">实验室验证</text>
    <text x="24" y="134" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">测试自动化纺织工序</text>
    <text x="24" y="162" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">检查结构与输出格式</text>
    <text x="24" y="190" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">验证工艺可用性</text>
  </g>

  <g filter="url(#shadow)" transform="translate(1008 220)">
    <rect width="250" height="200" rx="28" fill="url(#cardD)"/>
    <rect x="22" y="24" width="46" height="46" rx="14" fill="#8B5CF6" fill-opacity="0.18"/>
    <text x="34" y="54" fill="#6D28D9" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">04</text>
    <text x="24" y="100" fill="#0F172A" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="700">望江调研</text>
    <text x="24" y="134" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">观察真实工艺流程</text>
    <text x="24" y="162" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">核对风格判断标准</text>
    <text x="24" y="190" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">整理现场反馈</text>
  </g>

  <rect x="108" y="496" width="1184" height="220" rx="28" fill="white" fill-opacity="0.72" stroke="#CBD5E1"/>
  <text x="148" y="552" fill="#0F172A" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700">关键约束</text>
  <text x="148" y="600" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20">• 生成结果需要进入后续工序，而不只是停留在视觉展示</text>
  <text x="148" y="640" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="20">• 风格判断需要结合真实工艺、使用场景与现场反馈</text>

  <rect x="968" y="548" width="276" height="116" rx="22" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="996" y="592" fill="#1D4ED8" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="21" font-weight="700">目标</text>
  <text x="996" y="626" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">设计 → 生成 → 验证 → 调研</text>
  <text x="996" y="652" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18">让工具与场景持续校正</text>
</svg>
